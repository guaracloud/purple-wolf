mode = "monitor"
fail_mode = "fail_open"
upstream = "http://127.0.0.1:3000"
listen = "0.0.0.0:8080"
metrics_listen = "0.0.0.0:9090"

[body]
max_inspect_bytes = 1048576
over_cap = "pass"

[groups.injection]
enabled = true
mode = "enforce"

[groups.signatures]
enabled = true
mode = "enforce"

[groups.structural]
enabled = true
mode = "monitor"

[groups.reputation]
enabled = false
mode = "monitor"

# Reputation detector tuning. `per_second` is the per-source-IP rate
# limit; `deny_list` is a static allowlist of denied IPs. NOTE:
# `per_second` is fixed at process start — hot-reloading the config
# does NOT re-quota the limiter.
# [reputation]
# per_second = 100
# deny_list = []
