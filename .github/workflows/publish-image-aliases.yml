name: publish-image-aliases

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to alias, for example v0.4.5
        required: true
        type: string

concurrency:
  group: publish-image-aliases-${{ inputs.release_tag }}
  cancel-in-progress: false

env:
  IMAGE_RELAY: ghcr.io/guaracloud/purple-wolf-relay
  IMAGE_WASM: ghcr.io/guaracloud/purple-wolf-wasm

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Validate release tag
        id: version
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          echo "semver=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Publish and verify SemVer aliases
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          SEMVER: ${{ steps.version.outputs.semver }}
        run: |
          set -euo pipefail
          for image in "$IMAGE_RELAY" "$IMAGE_WASM"; do
            source_digest="$(docker buildx imagetools inspect \
              "$image:$RELEASE_TAG" --format '{{.Manifest.Digest}}')"
            test -n "$source_digest"
            docker buildx imagetools create \
              --tag "$image:$SEMVER" \
              "$image@$source_digest"
            alias_digest="$(docker buildx imagetools inspect \
              "$image:$SEMVER" --format '{{.Manifest.Digest}}')"
            test "$alias_digest" = "$source_digest"
            echo "$image:$SEMVER -> $source_digest"
          done
