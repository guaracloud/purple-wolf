name: ci
on:
  push:
    branches: [main, "v0.*/**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, "1.88"]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with: { toolchain: "${{ matrix.rust }}", components: "rustfmt,clippy" }
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets
      - run: cargo test --workspace --doc

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "rustfmt,clippy" }
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test core without optional TOML support
        run: cargo test -p purple-wolf-core --lib --no-default-features
      - name: Document core without optional TOML support
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc -p purple-wolf-core --no-default-features --no-deps

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Pin to a version that handles CVSS 4.0 entries in the upstream
      # RustSec advisory DB (e.g. RUSTSEC-2026-0076). Floating @v1 picks up
      # the stale 0.x bundled cargo-deny which trips on the new CVSS schema.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: stable

  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-wasip1 }
      - name: Install wasi-sdk
        run: |
          curl -sSL https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-22/wasi-sdk-22.0-linux.tar.gz | tar xz -C /opt
          echo "WASI_SDK_PATH=/opt/wasi-sdk-22.0" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p purple-wolf-traefik --target wasm32-wasip1 --release
      - run: ls -lh target/wasm32-wasip1/release/purple_wolf_traefik.wasm
      - uses: actions/upload-artifact@v7
        with: { name: purple-wolf.wasm, path: target/wasm32-wasip1/release/purple_wolf_traefik.wasm }

  fuzz-smoke:
    runs-on: ubuntu-latest
    # `rust-toolchain.toml` pins `channel = "stable"`, but cargo-fuzz needs
    # nightly for `-Zsanitizer=address`. Override the pin via RUSTUP_TOOLCHAIN
    # for the duration of the fuzz step so cargo-fuzz resolves nightly.
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz
      - uses: Swatinem/rust-cache@v2
      - run: |
          cd fuzz
          for t in request_parser injection_inspect signatures_inspect policy_decide client_ip relay_parser; do
            cargo +nightly fuzz run "$t" -- -max_total_time=30
          done

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with: { components: llvm-tools-preview }
      - run: cargo install cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      # Coverage floor is intentionally below the 80% target because the
      # WASM host glue in purple-wolf-traefik (entry.rs, host.rs) cannot be
      # fully exercised under `cargo test` — it needs a real wasm runtime.
      # The core crate sits at ~95% and the traefik adapter at ~93% after
      # the v0.2 hardening pass; the workspace floor was raised from 70 to
      # 75% in that pass to catch the next coverage regression sooner
      # (NEW-M11). Raise further as host-side integration coverage lands
      # (e.g. via wasmtime-driven e2e tests).
      - run: cargo llvm-cov --workspace --lcov --output-path lcov.info --fail-under-lines 75
      - uses: actions/upload-artifact@v7
        with: { name: lcov, path: lcov.info }

  docs:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  traefik-integration:
    # End-to-end check: build the .wasm, spin Traefik v3 + a stub upstream
    # via docker-compose, drive the attack matrix. Catches header-inspection
    # regressions (v0.2 C-1) and any future plugin-loading breakage.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-wasip1 }
      - name: Install wasi-sdk
        run: |
          curl -sSL https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-22/wasi-sdk-22.0-linux.tar.gz | tar xz -C /opt
          echo "WASI_SDK_PATH=/opt/wasi-sdk-22.0" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
      - name: Build release WASM
        run: cargo build -p purple-wolf-traefik --target wasm32-wasip1 --release
      - name: Run end-to-end suite (Traefik + plugin in Docker)
        # The suite spawns docker-compose itself; we just need to enable
        # the #[ignore]'d tests.
        run: |
          cargo test --manifest-path tests/traefik_integration/Cargo.toml \
            -- --ignored --test-threads=1 --nocapture
      - name: Dump Traefik logs on failure
        if: failure()
        run: |
          cd tests/traefik_integration
          docker compose logs traefik || true
          docker compose down -v || true

  relay-integration:
    # Full-stack check: Traefik + WAF + relay + mock subscriber
    # in docker-compose. Asserts that an audit event with operator
    # labels reaches the subscriber as a verified HMAC-signed
    # envelope. Catches regressions in the parser, sink, or signer.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-wasip1 }
      - name: Install wasi-sdk
        run: |
          curl -sSL https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-22/wasi-sdk-22.0-linux.tar.gz | tar xz -C /opt
          echo "WASI_SDK_PATH=/opt/wasi-sdk-22.0" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
      - name: Build release WASM + debug relay
        run: |
          cargo build -p purple-wolf-traefik --target wasm32-wasip1 --release
          cargo build -p purple-wolf-relay
      - name: Run full-stack relay suite
        run: |
          cargo test --manifest-path tests/relay_integration/Cargo.toml \
            -- --ignored --test-threads=1 --nocapture
      - name: Dump compose logs on failure
        if: failure()
        run: |
          cd tests/relay_integration
          docker compose logs traefik || true
          docker compose logs relay || true
          docker compose logs subscriber || true
          docker compose down -v || true
