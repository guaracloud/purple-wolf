http:
  routers:
    enforce:
      rule: "PathPrefix(`/e`)"
      service: echo
      middlewares: [strip-e, strict-waf]
    monitor:
      rule: "PathPrefix(`/m`)"
      service: echo
      middlewares: [strip-m, monitor-waf]
  services:
    echo:
      loadBalancer:
        servers:
          - url: "http://upstream:8000"
  middlewares:
    strip-e:
      stripPrefix: { prefixes: ["/e"] }
    strip-m:
      stripPrefix: { prefixes: ["/m"] }
    strict-waf:
      plugin:
        purpleWolf:
          mode: enforce
          body: { maxInspectBytes: 4096, overCap: pass }
          # v0.3 labels: arbitrary key=value metadata echoed verbatim into
          # every audit-log line for this Middleware. The audit-log
          # assertion in end_to_end.rs reads these back.
          labels:
            tenant: acme
            service: integration-test
            environment: ci
          groups:
            injection:  { enabled: true,  mode: enforce }
            signatures: { enabled: true,  mode: enforce }
    monitor-waf:
      plugin:
        purpleWolf:
          mode: monitor
          groups:
            injection: { enabled: true, mode: enforce }
