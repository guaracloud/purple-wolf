services:
  upstream:
    image: python:3-alpine
    command: ["python", "-m", "http.server", "8000"]

  subscriber:
    # Tiny Flask-based mock subscriber that records each request
    # body to /shared/requests.jsonl so the integration test can
    # introspect them from outside the container.
    image: python:3-alpine
    working_dir: /app
    volumes:
      - ./subscriber:/app:ro
      - ./shared:/shared
    command: ["sh", "-c", "pip install --quiet flask && python /app/subscriber.py"]
    environment:
      - PURPLEWOLF_SECRET=integration-test-secret
      - RECORD_PATH=/shared/requests.jsonl
    ports: ["${PURPLE_WOLF_SUBSCRIBER_PORT:-8090}:8090"]

  traefik:
    image: traefik:v3.7.7
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports: ["${PURPLE_WOLF_TRAEFIK_PORT:-8080}:8080"]
    volumes:
      - ./traefik:/etc/traefik:ro
      - ./plugin/.traefik.yml:/plugins-local/src/github.com/guaracloud/purple-wolf/.traefik.yml:ro
      - ../../target/wasm32-wasip1/release/purple_wolf_traefik.wasm:/plugins-local/src/github.com/guaracloud/purple-wolf/plugin.wasm:ro
      - ./shared:/shared
    depends_on:
      - upstream

  relay:
    image: purple-wolf-relay:integration
    build:
      context: ../..
      dockerfile: crates/purple-wolf-relay/Dockerfile
    command:
      - "--config"
      - "/etc/relay/relay.yaml"
      - "--admin-addr"
      - "0.0.0.0:9090"
    volumes:
      - ./relay:/etc/relay:ro
      - ./shared:/shared
    environment:
      - INTEGRATION_SECRET=integration-test-secret
      - RUST_LOG=info
    depends_on:
      - subscriber
      - traefik
    ports: ["${PURPLE_WOLF_RELAY_ADMIN_PORT:-9090}:9090"]
