# Relay config for the docker-compose full-stack test.
# Reads audit lines from the Traefik log file mounted into both
# containers. The test harness creates the file before Compose starts
# so the relay can open it at startup.
sources:
  - type: log_tail
    path: /shared/traefik.log
    from_beginning: true

subscribers:
  - id: e2e
    url: http://subscriber:8090/webhook
    secret_env: INTEGRATION_SECRET
    timeout_ms: 5000
    retry:
      max_attempts: 1
      base_delay_ms: 100
      max_delay_ms: 200

relay:
  instance_id: relay-integration
