apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: purple-wolf-enforce
  labels:
    app.kubernetes.io/name: purple-wolf
    app.kubernetes.io/component: waf-middleware
spec:
  plugin:
    purpleWolf:
      mode: enforce
      failMode: failOpen
      groups:
        injection: { enabled: true, mode: enforce }
        signatures: { enabled: true, mode: enforce }
        structural: { enabled: true, mode: enforce }
        reputation: { enabled: true, mode: enforce }
      reputation:
        perSecond: 100
        denyList: []
      xff:
        trustedHops: 1
