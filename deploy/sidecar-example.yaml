# Example: add purple-wolf as a sidecar in front of an app container.
# The app's Service targetPort must point at 8080 (the WAF), not the app port.
apiVersion: v1
kind: ConfigMap
metadata:
  name: purple-wolf-config
data:
  purple-wolf.toml: |
    mode = "monitor"
    fail_mode = "fail_open"
    upstream = "http://127.0.0.1:3000"
    listen = "0.0.0.0:8080"
    metrics_listen = "0.0.0.0:9090"
    [body]
    max_inspect_bytes = 1048576
    over_cap = "pass"
    [groups.injection]
    enabled = true
    mode = "enforce"
    [groups.signatures]
    enabled = true
    mode = "enforce"
    [groups.structural]
    enabled = true
    mode = "monitor"
    [groups.reputation]
    enabled = false
    mode = "monitor"
    # Reputation detector tuning. `per_second` is fixed at process
    # start; hot-reload does NOT re-quota the limiter.
    # [reputation]
    # per_second = 100
    # deny_list = []
---
# Patch to merge into an existing app Deployment's pod spec:
#   spec.template.spec.containers: add the purple-wolf container below.
#   The app container keeps listening on 3000; purple-wolf listens on 8080.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-app
spec:
  template:
    spec:
      # Pod-level securityContext for clusters that enforce the
      # `restricted` Pod Security Standard.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: purple-wolf
          image: purple-wolf:dev
          ports:
            - { name: waf, containerPort: 8080 }
            - { name: metrics, containerPort: 9090 }
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 250m, memory: 64Mi }
          # HTTP probes hit the dedicated `/healthz` endpoint, which is
          # mounted ahead of the WAF fallback and never invokes detectors.
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 5
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: waf-config, mountPath: /config }
      volumes:
        - name: waf-config
          configMap: { name: purple-wolf-config }
---
apiVersion: v1
kind: Service
metadata:
  name: example-app
spec:
  selector:
    app: example-app
  ports:
    - name: http
      port: 80
      targetPort: 8080   # routes to purple-wolf, which forwards to the app
