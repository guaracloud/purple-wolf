[graph]
all-features = true

[advisories]
yanked = "warn"

[licenses]
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-3-Clause", "ISC", "Unicode-3.0", "Zlib"]
confidence-threshold = 0.92

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Allow wildcard versions only for path/git deps — those are workspace-internal
# crates (e.g. purple-wolf-traefik -> purple-wolf-core) where pinning a
# version would just duplicate the workspace version.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
