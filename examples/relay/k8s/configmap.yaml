apiVersion: v1
kind: ConfigMap
metadata:
  name: purple-wolf-relay-config
  namespace: purple-wolf
data:
  relay.yaml: |
    sources:
      - type: log_tail
        path: /var/log/traefik/access.log

    subscribers:
      - id: siem-prod
        url: https://siem.example.com/ingest/purple-wolf
        secret_env: SIEM_HMAC_SECRET
        timeout_ms: 30000
        filter:
          severity_min: high

    relay:
      # Default is hostname; pinned here for cluster-wide dedup
      # when the deployment scales.
      instance_id: relay-prod
      subscriber_queue: 10000
