{{- if .Values.relay.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "purple-wolf.fullname" . }}-relay
  labels:
    {{- include "purple-wolf.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook-relay
  {{- with .Values.relay.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.relay.service.type }}
  selector:
    {{- include "purple-wolf.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: webhook-relay
  ports:
    - name: admin
      port: {{ .Values.relay.service.port }}
      targetPort: admin
      protocol: TCP
{{- end }}
