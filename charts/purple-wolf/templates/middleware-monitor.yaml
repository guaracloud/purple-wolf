{{- if and .Values.middlewares.enabled .Values.middlewares.monitor.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Values.middlewares.monitor.name }}
  namespace: {{ default .Release.Namespace .Values.middlewares.namespace }}
  labels:
    {{- include "purple-wolf.labels" . | nindent 4 }}
    app.kubernetes.io/component: waf-middleware
spec:
  plugin:
    purpleWolf:
      mode: monitor
      {{- with .Values.middlewares.monitor.labels }}
      labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      groups:
        {{- toYaml .Values.middlewares.monitor.groups | nindent 8 }}
{{- end }}
