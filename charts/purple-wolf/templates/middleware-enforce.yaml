{{- if and .Values.middlewares.enabled .Values.middlewares.enforce.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Values.middlewares.enforce.name }}
  namespace: {{ default .Release.Namespace .Values.middlewares.namespace }}
  labels:
    {{- include "purple-wolf.labels" . | nindent 4 }}
    app.kubernetes.io/component: waf-middleware
spec:
  plugin:
    purpleWolf:
      mode: enforce
      failMode: {{ .Values.middlewares.enforce.failMode }}
      {{- with .Values.middlewares.enforce.labels }}
      labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      groups:
        {{- toYaml .Values.middlewares.enforce.groups | nindent 8 }}
      reputation:
        {{- toYaml .Values.middlewares.enforce.reputation | nindent 8 }}
      xff:
        {{- toYaml .Values.middlewares.enforce.xff | nindent 8 }}
{{- end }}
