{{- if and .Values.relay.enabled .Values.relay.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "purple-wolf.serviceAccountName" . }}
  labels:
    {{- include "purple-wolf.labels" . | nindent 4 }}
  {{- with .Values.relay.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
